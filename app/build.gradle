apply plugin: 'com.android.application'
apply plugin: 'org.jetbrains.kotlin.android'

android {
    compileSdkVersion 33

    defaultConfig {
        applicationId "org.noip.rabbitsden.sunny.ru_and_ukr_keyboard_layouts"
        minSdkVersion 29
        targetSdkVersion 33
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    namespace 'org.noip.rabbitsden.sunny.ru_and_ukr_keyboard_layouts'
}

dependencies {
    implementation 'androidx.core:core-ktx:+'
}
